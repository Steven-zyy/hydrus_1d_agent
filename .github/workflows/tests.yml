name: tests

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  pytest:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest ]
        python-version: [ "3.10", "3.11" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Show pip freeze (debug)
        run: pip freeze

      # HYDRUS_EXE is intentionally NOT set. H1D_CALC.EXE is a Windows
      # PE binary that ships with PC-Progress HYDRUS-1D and cannot be
      # installed in CI. The six tests that require a real HYDRUS run
      # skip cleanly when HYDRUS_EXE is unset.
      - name: Run tests
        run: pytest tests/ -q
